<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1200, initial-scale=1.0"/>
    <title>Control de Agua - Cisterna de Agua 1434</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #ecf0f3; color: #003366; min-width: 1200px; }
        h1 { text-align: center; margin: 10px 0; font-size: 24px; }
        .buttons { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .btn { background-color: #f9cd00; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: bold; }
        #reporte { width: 1150px; margin: auto; background: white; padding: 20px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th, td { border: 1px solid #aaa; padding: 6px; text-align: left; }
        th { background-color: #dde6f3; }
        input, select, textarea { width: 100%; font-size: 11px !important; border: none; background: transparent; color: #003366; height: 25px; }
        input[readonly] { background-color: #f0f0f0; }
        @media print { .buttons, button { display: none !important; } body { min-width: 100%; } #reporte { width: 100%; border: none; } }
    </style>
</head>
<body>

    <h1>💧 Reporte Cisterna de Agua - 1434</h1>

    <div class="buttons">
        <button class="btn" id="btnPDF">📄 PDF / ENVIAR REPORTE</button>
        <button class="btn" style="background-color: #003366;" onclick="window.location.href='panelagua.html'">🔙 VOLVER</button>
    </div>

    <div id="reporte">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <div style="font-size:28px; font-weight:bold; color:#f9cd00">GEOTEC</div>
            <div style="text-align:center; font-weight:bold; color:#003366; font-size:18px">CONTROL DIARIO DE AGUA</div>
            <div style="font-size:12px; font-weight:600; color:#003366;">PROYECTO: LAS BAMBAS</div>
        </div>

        <div style="display: flex; justify-content: space-between; gap: 20px; margin-bottom: 20px;">
            <table style="width: 100%; max-width: 400px;">
                <tr>
                    <th style="width: 40%;">CONDUCTOR</th>
                    <td><input type="text" id="mainConductor" oninput="this.value = this.value.toUpperCase(); sincronizar()"></td>
                </tr>
                <tr>
                    <th>FECHA</th>
                    <td><input type="date" id="mainFecha" oninput="sincronizar()"></td>
                </tr>
                <tr>
                    <th>ZONA</th>
                    <td><input type="text" id="mainZona" oninput="this.value = this.value.toUpperCase(); sincronizar()"></td>
                </tr>
            </table>

            <table style="width: 35%; min-width: 280px; flex-shrink: 0; font-size: 10px; border-collapse: collapse;">     
                <tr>
                    <th style="text-align: left; border: 1px solid #aaa; padding: 15px 8px;">TURNO</th>
                    <td style="border: 1px solid #aaa;">
                        <select id="mainTurno" onchange="sincronizar()">
                            <option value="DIA">DIA</option>
                            <option value="NOCHE">NOCHE</option>
                        </select>
                    </td>
                </tr>    
                <tr>
                    <th style="text-align: left; border: 1px solid #aaa; padding: 15px 8px;">PLACA</th>
                    <td style="border: 1px solid #aaa;">
                        <input type="text" id="mainPlaca" readonly style="text-align: center;">
                    </td>
                </tr>
                <tr>
                    <th style="text-align: left; border: 1px solid #aaa; padding: 15px 8px;">CODIGO CISTERNA</th>
                    <td style="border: 1px solid #aaa;">
                        <input type="text" id="mainID" oninput="sincronizar()" style="text-align: center;">
                    </td>
                </tr>
            </table>
        </div>

        <table id="tablaEntregas">
            <thead>
                <tr>
                    <th>Empresa</th><th>Codigo</th><th>Placa</th><th>Fecha</th><th>Turno</th><th>Procedencia</th><th>Cant. Entregada</th><th>Comentarios / Destino</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
            <tfoot>
                <tr>
                    <td colspan="6" style="text-align: right; font-weight: bold; background:#eee;">TOTAL GALONES ENTREGADOS</td>
                    <td style="background:#fffef5;"><input type="number" id="totalEntregado" readonly style="font-weight:bold;"></td>
                    <td style="background:#eee;"></td>
                </tr>
            </tfoot>
        </table>

        <div style="display: flex; justify-content: space-between; margin-top: 20px; align-items: flex-start;">
            <div style="width: 60%;">
                <label style="font-size:11px; font-weight:bold;">OBSERVACIONES:</label>
                <textarea id="obs" style="border: 1px solid #aaa; height: 80px; margin-top:5px; padding:5px; background:white; width:100%;"></textarea>
            </div>
            <div style="text-align: center;">
                <canvas id="firmaCanvas" width="300" height="100" style="border:1px solid #ccc; background:#fff;"></canvas>
                <p style="margin:5px 0; font-size:11px; font-weight:bold;">FIRMA DEL CONDUCTOR</p>
                <button onclick="limpiarFirma()" style="font-size:10px;">Limpiar</button>
            </div>
        </div>
    </div>

    <script>
        const URL_FIREBASE = "https://geotec-control-default-rtdb.firebaseio.com/reportes.json";

        // 1. ALERTA DE SEGURIDAD (Si intentan actualizar, sale el mensaje del navegador)
        window.onbeforeunload = function() {
            return "¿Deseas salir? Si no has enviado el reporte, los datos se borrarán.";
        };

        // Generar 15 filas
        const cuerpo = document.getElementById('cuerpoTabla');
        for(let i=0; i<15; i++) {
            cuerpo.innerHTML += `
                <tr>
                    <td><input type="text" value="GEOTEC" oninput="this.value = this.value.toUpperCase()"></td>
                    <td><input type="text" class="col-id" readonly></td>
                    <td><input type="text" class="col-placa" readonly></td>
                    <td><input type="text" class="col-fecha" readonly></td>
                    <td><input type="text" class="col-turno" readonly></td>
                    <td><input type="text" oninput="this.value = this.value.toUpperCase()"></td>
                    <td><input type="number" class="galones" oninput="calcularTodo()"></td>
                    <td><input type="text" oninput="this.value = this.value.toUpperCase()"></td>
                </tr>`;
        }

        function sincronizar() {
            const f = document.getElementById('mainFecha').value;
            const t = document.getElementById('mainTurno').value;
            const id = document.getElementById('mainID').value.trim();
            const placas = { "1309": "VDH-880", "2313": "VDI-825", "2319": "VBQ-991", "821": "BUZ-873", "1434": "BUZ-874", "823": "VBO-933" };
            const p = placas[id] || "";
            document.getElementById('mainPlaca').value = p;
            document.querySelectorAll('.col-fecha').forEach(i => i.value = f);
            document.querySelectorAll('.col-turno').forEach(i => i.value = t);
            document.querySelectorAll('.col-placa').forEach(i => i.value = p);
            document.querySelectorAll('.col-id').forEach(i => i.value = id.toUpperCase());
        }

        function calcularTodo() {
            let total = 0;
            document.querySelectorAll('.galones').forEach(i => total += parseFloat(i.value) || 0);
            document.getElementById('totalEntregado').value = total.toFixed(2);
        }

        // --- BLOQUE DE FIRMA CORREGIDO (PC Y CELULAR) ---
        const canvas = document.getElementById('firmaCanvas');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        const pos = (e) => {
            const r = canvas.getBoundingClientRect();
            // Detecta si es toque (celular) o click (PC)
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - r.left,
                y: clientY - r.top
            };
        }

        // Eventos para PC (Mouse)
        canvas.addEventListener('mousedown', (e) => { 
            dibujando = true; 
            ctx.beginPath(); 
            ctx.moveTo(pos(e).x, pos(e).y); 
        });
        canvas.addEventListener('mousemove', (e) => { 
            if(dibujando) { 
                ctx.lineTo(pos(e).x, pos(e).y); 
                ctx.stroke(); 
            } 
        });
        window.addEventListener('mouseup', () => dibujando = false);

        // Eventos para Celular (Touch)
        canvas.addEventListener('touchstart', (e) => {
            const p = pos(e);
            dibujando = true;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            e.preventDefault(); // Evita que la pantalla se mueva al firmar
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (dibujando) {
                const p = pos(e);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                e.preventDefault(); // Evita que la pantalla se mueva al firmar
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            dibujando = false;
        });

        function limpiarFirma() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }
        // --- FIN BLOQUE DE FIRMA ---

        // Envío a Firebase y PDF
        document.getElementById("btnPDF").addEventListener("click", async () => {
            try {
                const excelBase64 = XLSX.write(XLSX.utils.table_to_book(document.getElementById("tablaEntregas")), { bookType: 'xlsx', type: 'base64' });
                const reporte = {
                    fechaEnvio: new Date().toLocaleString(),
                    conductor: document.getElementById('mainConductor').value,
                    nombre: `CIST-1434${document.getElementById('mainID').value}_${document.getElementById('mainFecha').value}.xlsx`,
                    archivo: excelBase64
                };

                await fetch(URL_FIREBASE, { method: 'POST', body: JSON.stringify(reporte) });
                alert("✅ ENVIADO");

                html2canvas(document.getElementById("reporte")).then(canvas => {
                    const pdf = new jspdf.jsPDF("l", "mm", "a4");
                    pdf.addImage(canvas.toDataURL("image/png"), "PNG", 5, 5, 287, 150);
                    pdf.save(reporte.nombre.replace(".xlsx", ".pdf"));
                });
            } catch (e) { alert("❌ Error de red."); }
        });
    </script>
</body>
</html>
